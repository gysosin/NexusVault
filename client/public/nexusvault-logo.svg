<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="url(#grad1)" stroke-width="12" />
  
  <!-- Central Hexagon (The Vault) -->
  <path d="M256 120 L370 185 V315 L256 380 L142 315 V185 Z" fill="none" stroke="url(#grad1)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Network Nodes (The Nexus) -->
  <circle cx="256" cy="250" r="30" fill="#3b82f6" />
  <circle cx="256" cy="120" r="16" fill="#8b5cf6" />
  <circle cx="370" cy="185" r="16" fill="#8b5cf6" />
  <circle cx="370" cy="315" r="16" fill="#8b5cf6" />
  <circle cx="256" cy="380" r="16" fill="#8b5cf6" />
  <circle cx="142" cy="315" r="16" fill="#8b5cf6" />
  <circle cx="142" cy="185" r="16" fill="#8b5cf6" />
  
  <!-- Connecting Lines -->
  <path d="M256 250 L256 136" stroke="#64748b" stroke-width="4" />
  <path d="M256 250 L354 194" stroke="#64748b" stroke-width="4" />
  <path d="M256 250 L354 306" stroke="#64748b" stroke-width="4" />
  <path d="M256 250 L256 364" stroke="#64748b" stroke-width="4" />
  <path d="M256 250 L158 306" stroke="#64748b" stroke-width="4" />
  <path d="M256 250 L158 194" stroke="#64748b" stroke-width="4" />

  <!-- Keyhole Shape inside Center -->
  <path d="M256 235 A 15 15 0 0 1 256 265 A 15 15 0 0 1 256 235 M256 265 L256 280" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />

</svg>
